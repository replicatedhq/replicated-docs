StylesPath = styles

MinAlertLevel = suggestion

Packages = Google, MDX

Vocab = ReplicatedTerms, TechJargon, ThirdPartyProducts
SkippedScopes = script, style, pre, alt
IgnoredScopes = code, tt, a, img

[formats]
mdx = md

[*.{md,mdx}]

BasedOnStyles = Vale, Google, Replicated

Google.Acronyms = NO
Google.WordList = NO
Google.Colons = NO
Google.Contractions = NO
Google.Headings = NO
Google.Parens = NO
Google.Quotes = NO
Vale.Terms = NO

# Don't lint CLI docs
[docs/reference/kots-cli-*]
BasedOnStyles =

[docs/reference/replicated-cli-*]
BasedOnStyles =

# Don't lint release notes
[docs/release-notes/rn-*]
BasedOnStyles =
